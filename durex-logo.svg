<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 36" width="110" height="36">
  <!-- Blue rounded rectangle background -->
  <rect width="110" height="36" rx="6" fill="#0057A8"/>
  <!-- Subtle gradient overlay -->
  <rect width="110" height="36" rx="6" fill="url(#grad)" opacity="0.4"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.15"/>
    </linearGradient>
  </defs>
  <!-- Durex wordmark in white italic -->
  <text x="55" y="26" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="bold" font-size="22" fill="#ffffff" text-anchor="middle" letter-spacing="1">Durex</text>
</svg>
